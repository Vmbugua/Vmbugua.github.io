<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Veronicah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">Veronicah Mbugua<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main>
  <section class="page-hero">
    <div class="wrap">
      <span class="eyebrow">Contact</span>
      <h1>Let's talk</h1>
    </div>
  </section>

  <section class="reveal">
    <div class="wrap contact-grid">

      <form class="contact-form" id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>

      <div class="social-links">
        <a class="social-card" href="#">
          <i class="fa-brands fa-linkedin"></i>
          <div>
            <span class="label">LinkedIn</span>
            <span class="value">www.linkedin.com/in/veronicah-mbugua-54a743422

</span>
          </div>
        </a>
        <a class="social-card" href="#">
          <i class="fa-brands fa-github"></i>
          <div>
            <span class="label">GitHub</span>
            <span class="value">https://github.com/Vmbugua</span>
          </div>
        </a>
        <a class="social-card" href="#">
          <i class="fa-solid fa-envelope"></i>
          <div>
            <span class="label">Email</span>
            <span class="value">mbuguaveronicah01@gmail.com</span>
          </div>
        </a>
      </div>

    </div>
  </section>
</main>

<footer>
  &copy; 2026 Veronicah. Built with HTML, CSS &amp; JavaScript.
</footer>

<script src="script.js"></script>
</body>
</html>
